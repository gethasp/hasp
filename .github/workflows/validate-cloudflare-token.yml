name: Validate Cloudflare token

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    if: github.repository == 'gethasp/hasp'
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Bootstrap web tools
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate
          pnpm -C apps/web install --frozen-lockfile
      - name: Confirm token reaches the Cloudflare account
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          : "${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN is required}"
          : "${CLOUDFLARE_ACCOUNT_ID:?CLOUDFLARE_ACCOUNT_ID is required}"
          pnpm -C apps/web exec wrangler whoami
      - name: Confirm token can plan a hasp-download-site deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm -C apps/web exec wrangler deploy --dry-run --config downloads/wrangler.toml
