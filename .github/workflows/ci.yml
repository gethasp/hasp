name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
      - "Makefile"
      - ".golangci.yml"
      - "VERSION"
      - "apps/server/**"
      - "scripts/**/*.sh"
      - "scripts/**/*.py"
      - "scripts/**/*.json"
      - "scripts/**/*.txt"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
      - "Makefile"
      - ".golangci.yml"
      - "VERSION"
      - "apps/server/**"
      - "scripts/**/*.sh"
      - "scripts/**/*.py"
      - "scripts/**/*.json"
      - "scripts/**/*.txt"

permissions:
  contents: read

jobs:
  merge-gate:
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: Bootstrap Go tools
        run: bash ./scripts/bootstrap_go_tools.sh verify
      - name: Verify public CI
        run: make verify-ci
      - name: Packaged release smoke
        env:
          HASP_ALLOW_EPHEMERAL_RELEASE_SIGNING: "1"
        run: make release-smoke
      - name: Coverage
        env:
          HASP_ALLOW_EPHEMERAL_RELEASE_SIGNING: "1"
        run: make coverage
