name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fork-pr-verify:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.3'
          cache: false
      - name: Bootstrap Go tools
        run: bash ./scripts/bootstrap_go_tools.sh verify

      - name: OSV scanner gate
        run: make osv-scan

      - name: Check links
        run: make check-links
      - name: Check Go module tidy
        run: make check-tidy
      - name: Check generated docs
        run: make check-generated-docs
      - name: Check telemetry release gate
        run: make check-telemetry-release-gate
      - name: Lint workflows
        run: make workflow-lint
      - name: Shellcheck scripts
        run: make shellcheck
      - name: Test go mod tidy script
        run: bash scripts/test-check-go-mod-tidy.sh
      - name: Test public installer
        run: bash scripts/test-public-installer.sh
      - name: Test public docs versioning
        run: bash scripts/test-public-docs-versioning.sh
      - name: Test release metadata parser
        run: bash scripts/test-release-metadata-parser.sh
      - name: Test release targets
        run: bash scripts/test-release-targets.sh
      - name: Check public release contract
        run: python3 scripts/check-public-release-contract.py
      - name: Test public release package
        run: bash scripts/test-package-public-release.sh
      - name: Test server
        run: make test
      - name: Lint server
        run: make lint
      - name: Coverage
        env:
          HASP_ALLOW_EPHEMERAL_RELEASE_SIGNING: "1"
        run: make coverage

  merge-gate:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.3'
          cache: false
      - name: Bootstrap Go tools
        run: bash ./scripts/bootstrap_go_tools.sh verify

      - name: OSV scanner gate
        run: make osv-scan

      - name: Check links
        run: make check-links
      - name: Check Go module tidy
        run: make check-tidy
      - name: Check generated docs
        run: make check-generated-docs
      - name: Check telemetry release gate
        run: make check-telemetry-release-gate
      - name: Lint workflows
        run: make workflow-lint
      - name: Shellcheck scripts
        run: make shellcheck
      - name: Test go mod tidy script
        run: bash scripts/test-check-go-mod-tidy.sh
      - name: Test public installer
        run: bash scripts/test-public-installer.sh
      - name: Test public docs versioning
        run: bash scripts/test-public-docs-versioning.sh
      - name: Test release metadata parser
        run: bash scripts/test-release-metadata-parser.sh
      - name: Test release targets
        run: bash scripts/test-release-targets.sh
      - name: Check public release contract
        run: python3 scripts/check-public-release-contract.py
      - name: Test public release package
        run: bash scripts/test-package-public-release.sh
      - name: Test server
        run: make test
      - name: Lint server
        run: make lint
      - name: Run evals
        run: make evals
      - name: Vulnerability check
        run: make vulncheck
      - name: Integration tests
        run: make test-integration
      - name: Race tests
        run: make test-race
      - name: Coverage
        env:
          HASP_ALLOW_EPHEMERAL_RELEASE_SIGNING: "1"
        run: make coverage
      - name: Conformance
        env:
          HASP_ALLOW_EPHEMERAL_RELEASE_SIGNING: "1"
        run: make conformance

  darwin-audit-coverage:
    if: github.event.repository.private == false
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.3'
          cache: false
      - name: Audit Darwin coverage
        run: make coverage-audit-platform
