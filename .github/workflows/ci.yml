name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  merge-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Bootstrap Go tools
        run: bash ./scripts/bootstrap_go_tools.sh verify
      - name: Verify public CI
        run: make verify-ci
      - name: Packaged release smoke
        env:
          HASP_ALLOW_EPHEMERAL_RELEASE_SIGNING: "1"
        run: make release-smoke
      - name: Coverage
        env:
          HASP_ALLOW_EPHEMERAL_RELEASE_SIGNING: "1"
        run: make coverage
