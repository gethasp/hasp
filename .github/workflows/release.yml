name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to resume, for example v0.1.56"
        required: true
        type: string
      source_run_id:
        description: "Release workflow run ID that produced the public-release artifact"
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: public-release
  cancel-in-progress: false

jobs:
  release-targets:
    if: github.event_name == 'push' && github.repository == 'gethasp/hasp' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubicloud-standard-2
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: targets
        run: python3 scripts/release_targets.py github-output >> "$GITHUB_OUTPUT"

  release-smoke:
    name: Release Smoke (${{ matrix.goos }}/${{ matrix.goarch }})
    needs:
      - release-targets
      - build-public-release
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.release-targets.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.3'
          cache: false
      - name: Bootstrap Go tools
        run: bash ./scripts/bootstrap_go_tools.sh release-smoke
      - name: Test Darwin packages
        if: matrix.goos == 'darwin'
        run: make test
      - name: Race Darwin packages
        if: matrix.goos == 'darwin' && matrix.goarch == 'arm64'
        run: |
          make test-race || {
            echo "first Darwin race run failed; retrying once" >&2
            make test-race
          }
      - name: Audit Darwin coverage
        if: matrix.goos == 'darwin' && matrix.goarch == 'arm64'
        run: make coverage-audit-platform
      - name: Smoke release artifact
        run: bash ./scripts/release-smoke.sh --target "${{ matrix.goos }}/${{ matrix.goarch }}" --release-dir "dist/public-release/${GITHUB_REF_NAME}"

  release-preflight:
    needs: release-targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.3'
          cache: false
      - name: Bootstrap Go tools
        run: bash ./scripts/bootstrap_go_tools.sh verify
      - name: Check links
        run: make check-links
      - name: Check Go module tidy
        run: make check-tidy
      - name: Check generated docs
        run: make check-generated-docs
      - name: Check telemetry release gate
        run: make check-telemetry-release-gate
      - name: Lint workflows
        run: make workflow-lint
      - name: Shellcheck scripts
        run: make shellcheck
      - name: Test go mod tidy script
        run: bash scripts/test-check-go-mod-tidy.sh
      - name: Test public installer
        run: bash scripts/test-public-installer.sh
      - name: Test public docs versioning
        run: bash scripts/test-public-docs-versioning.sh
      - name: Test release metadata parser
        run: bash scripts/test-release-metadata-parser.sh
      - name: Test release targets
        run: bash scripts/test-release-targets.sh
      - name: Check public release contract
        run: python3 scripts/check-public-release-contract.py
      - name: Test public release package
        run: bash scripts/test-package-public-release.sh
      - name: Test server
        run: make test
      - name: Lint server
        run: make lint

  build-public-release:
    needs:
      - release-targets
      - release-preflight
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.3'
          cache: false
      - name: Bootstrap Go tools
        run: bash ./scripts/bootstrap_go_tools.sh verify
      - name: Validate release tag matches VERSION
        run: test "v$(cat VERSION)" = "${GITHUB_REF_NAME}"
      - name: Verify release tag commit is on main
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Validate release contains core CLI changes
        run: bash ./scripts/check-release-core-change.sh "${GITHUB_REF_NAME}"
      - name: Import release signing key
        env:
          HASP_RELEASE_GPG_PRIVATE_KEY: ${{ secrets.HASP_RELEASE_GPG_PRIVATE_KEY }}
        run: |
          test -n "$HASP_RELEASE_GPG_PRIVATE_KEY"
          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          chmod 700 "$GNUPGHOME"
          printf '%s' "$HASP_RELEASE_GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
      - name: Extract release notes from changelog
        run: bash ./scripts/release-notes-from-changelog.sh "${GITHUB_REF_NAME}" > release-notes.md
      - name: Build public release set
        env:
          HASP_TEAM_ID: ${{ secrets.HASP_TEAM_ID || 'UFV835UGV6' }}
          HASP_RELEASE_GPG_KEY_ID: ${{ secrets.HASP_RELEASE_GPG_KEY_ID }}
          HASP_RELEASE_GPG_PASSPHRASE: ${{ secrets.HASP_RELEASE_GPG_PASSPHRASE }}
          HASP_RELEASE_TRUSTED_GPG_FINGERPRINTS: ${{ secrets.HASP_RELEASE_TRUSTED_GPG_FINGERPRINTS }}
          HASP_UPGRADE_TRUST_ROOTS_HEX: ${{ secrets.HASP_UPGRADE_TRUST_ROOTS_HEX }}
          HASP_UPGRADE_SIGNING_KEY_B64: ${{ secrets.HASP_UPGRADE_SIGNING_KEY_B64 }}
          HASP_RELEASE_BASE_URL: https://downloads.gethasp.com/hasp/releases
        run: bash ./scripts/package-public-release.sh "${GITHUB_REF_NAME}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: public-release
          path: |
            dist/public-release/${{ github.ref_name }}/**/*
            release-notes.md

  publish-r2:
    needs:
      - release-smoke
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
      - name: Publish terminal release to Cloudflare R2
        env:
          HASP_R2_ENDPOINT: ${{ secrets.HASP_R2_ENDPOINT }}
          HASP_R2_BUCKET: ${{ secrets.HASP_R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.HASP_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HASP_R2_SECRET_ACCESS_KEY }}
        run: |
          : "${HASP_R2_ENDPOINT:?HASP_R2_ENDPOINT is required}"
          : "${HASP_R2_BUCKET:?HASP_R2_BUCKET is required}"
          : "${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}"
          : "${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}"
          RELEASE_TAG="${GITHUB_REF_NAME}"
          release_dir="dist/public-release/${GITHUB_REF_NAME}"
          metadata="$release_dir/release-metadata.json"
          test -d "$release_dir"
          test -f "$metadata"
          actual_version="$(python3 - <<'PY' "$metadata"
          import json
          import sys
          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              print(json.load(handle)["version"])
          PY
          )"
          test "v${actual_version}" = "$RELEASE_TAG"
          bash ./scripts/publish-release-to-r2.sh "$release_dir" "$RELEASE_TAG"

  promote-latest-mirror:
    needs: publish-r2
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
      - name: Promote latest release mirror
        env:
          HASP_R2_ENDPOINT: ${{ secrets.HASP_R2_ENDPOINT }}
          HASP_R2_BUCKET: ${{ secrets.HASP_R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.HASP_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HASP_R2_SECRET_ACCESS_KEY }}
          HASP_R2_PROMOTE_LATEST: "1"
        run: |
          release_dir="dist/public-release/${GITHUB_REF_NAME}"
          test -d "$release_dir"
          bash ./scripts/publish-release-to-r2.sh "$release_dir" "${GITHUB_REF_NAME}"
      - name: Verify latest release mirror
        run: |
          release_dir="dist/public-release/${GITHUB_REF_NAME}"
          retry_latest_diff() {
            local asset="$1"
            local tmp="/tmp/hasp-latest-${asset//\//-}"
            local attempt
            for attempt in $(seq 1 12); do
              if curl -fsS "https://downloads.gethasp.com/hasp/releases/latest/${asset}" -o "$tmp" && diff -u "$release_dir/$asset" "$tmp"; then
                return 0
              fi
              sleep 10
            done
            curl -fsS "https://downloads.gethasp.com/hasp/releases/latest/${asset}" -o "$tmp"
            diff -u "$release_dir/$asset" "$tmp"
          }
          for asset in release-metadata.json release-metadata.json.asc hasp-release-public-key.asc; do
            retry_latest_diff "$asset"
          done

  homebrew-formula-smoke:
    needs: publish-r2
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
      - name: Smoke packaged Homebrew formula
        run: |
          bash ./scripts/homebrew-formula-smoke.sh "dist/public-release/${GITHUB_REF_NAME}/Formula/hasp.rb"

  publish-homebrew-tap:
    needs:
      - promote-latest-mirror
      - homebrew-formula-smoke
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
      - name: Publish Homebrew tap
        env:
          HASP_HOMEBREW_TAP_TOKEN: ${{ secrets.HASP_HOMEBREW_TAP_TOKEN }}
          HASP_HOMEBREW_TAP_PUSH_KEY: ${{ secrets.HASP_HOMEBREW_TAP_PUSH_KEY }}
        run: |
          if [[ -n "$HASP_HOMEBREW_TAP_TOKEN" ]]; then
            tap_auth_header="$(printf 'x-access-token:%s' "$HASP_HOMEBREW_TAP_TOKEN" | base64 | tr -d '\n')"
            trap 'git -C tap-repo config --local --unset-all http.https://github.com/.extraheader >/dev/null 2>&1 || true' EXIT
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $tap_auth_header" \
              clone https://github.com/gethasp/homebrew-tap.git tap-repo
            git -C tap-repo config --local http.https://github.com/.extraheader "AUTHORIZATION: basic $tap_auth_header"
          elif [[ -n "$HASP_HOMEBREW_TAP_PUSH_KEY" ]]; then
            test -n "$HASP_HOMEBREW_TAP_PUSH_KEY"
            eval "$(ssh-agent -s)"
            printf '%s' "$HASP_HOMEBREW_TAP_PUSH_KEY" | base64 --decode > tap_key
            chmod 600 tap_key
            ssh-add tap_key
            git clone git@github.com:gethasp/homebrew-tap.git tap-repo
          else
            echo "HASP_HOMEBREW_TAP_TOKEN or HASP_HOMEBREW_TAP_PUSH_KEY is required" >&2
            exit 1
          fi
          bash ./scripts/publish-homebrew-tap.sh --push "dist/public-release/${GITHUB_REF_NAME}/Formula/hasp.rb" tap-repo "${GITHUB_REF_NAME}"

  published-release-live-smoke:
    needs: publish-homebrew-tap
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Smoke published install paths
        run: |
          bash ./scripts/verify-live-release.sh --skip-github-release --brew-install "${GITHUB_REF_NAME}"

  github-release:
    needs:
      - publish-r2
      - promote-latest-mirror
      - publish-homebrew-tap
      - published-release-live-smoke
    runs-on: ubicloud-standard-2
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: |
            dist/public-release/${{ github.ref_name }}/hasp*
            dist/public-release/${{ github.ref_name }}/KEYS-*
            dist/public-release/${{ github.ref_name }}/release-metadata.json*
            dist/public-release/${{ github.ref_name }}/SHA256SUMS*
            dist/public-release/${{ github.ref_name }}/RELEASE-SIGNING-FINGERPRINT.txt

  resume-inputs:
    if: github.event_name == 'workflow_dispatch' && github.repository == 'gethasp/hasp'
    runs-on: ubicloud-standard-2
    permissions:
      actions: read
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      source_run_id: ${{ steps.validate.outputs.source_run_id }}
      release_dir: ${{ steps.validate.outputs.release_dir }}
    steps:
      - name: Validate resume inputs
        id: validate
        env:
          RAW_TAG: ${{ inputs.tag }}
          RAW_SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          tag="$RAW_TAG"
          source_run_id="$RAW_SOURCE_RUN_ID"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag must match ^v[0-9]+\\.[0-9]+\\.[0-9]+$: $tag" >&2
            exit 2
          fi
          if [[ ! "$source_run_id" =~ ^[0-9]+$ ]]; then
            echo "source_run_id must match ^[0-9]+$: $source_run_id" >&2
            exit 2
          fi
          release_dir="dist/public-release/$tag"
          {
            printf 'tag=%s\n' "$tag"
            printf 'source_run_id=%s\n' "$source_run_id"
            printf 'release_dir=%s\n' "$release_dir"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
          run-id: ${{ steps.validate.outputs.source_run_id }}
          github-token: ${{ github.token }}
      - name: Verify resume artifact
        env:
          RELEASE_DIR: ${{ steps.validate.outputs.release_dir }}
        run: |
          test -d "$RELEASE_DIR"

  resume-latest-mirror:
    if: github.event_name == 'workflow_dispatch' && github.repository == 'gethasp/hasp'
    needs: resume-inputs
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
          run-id: ${{ needs.resume-inputs.outputs.source_run_id }}
          github-token: ${{ github.token }}
      - name: Promote latest release mirror
        env:
          RELEASE_TAG: ${{ needs.resume-inputs.outputs.tag }}
          RELEASE_DIR: ${{ needs.resume-inputs.outputs.release_dir }}
          HASP_R2_ENDPOINT: ${{ secrets.HASP_R2_ENDPOINT }}
          HASP_R2_BUCKET: ${{ secrets.HASP_R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.HASP_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HASP_R2_SECRET_ACCESS_KEY }}
          HASP_R2_PROMOTE_LATEST: "1"
        run: |
          test -d "$RELEASE_DIR"
          bash ./scripts/publish-release-to-r2.sh "$RELEASE_DIR" "$RELEASE_TAG"
      - name: Verify latest release mirror
        env:
          RELEASE_DIR: ${{ needs.resume-inputs.outputs.release_dir }}
        run: |
          retry_latest_diff() {
            local asset="$1"
            local tmp="/tmp/hasp-latest-${asset//\//-}"
            local attempt
            for attempt in $(seq 1 12); do
              if curl -fsS "https://downloads.gethasp.com/hasp/releases/latest/${asset}" -o "$tmp" && diff -u "$RELEASE_DIR/$asset" "$tmp"; then
                return 0
              fi
              sleep 10
            done
            curl -fsS "https://downloads.gethasp.com/hasp/releases/latest/${asset}" -o "$tmp"
            diff -u "$RELEASE_DIR/$asset" "$tmp"
          }
          for asset in release-metadata.json release-metadata.json.asc hasp-release-public-key.asc; do
            retry_latest_diff "$asset"
          done

  resume-publish-homebrew-tap:
    if: github.event_name == 'workflow_dispatch' && github.repository == 'gethasp/hasp'
    needs:
      - resume-inputs
      - resume-latest-mirror
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
          run-id: ${{ needs.resume-inputs.outputs.source_run_id }}
          github-token: ${{ github.token }}
      - name: Publish Homebrew tap
        env:
          RELEASE_TAG: ${{ needs.resume-inputs.outputs.tag }}
          RELEASE_DIR: ${{ needs.resume-inputs.outputs.release_dir }}
          HASP_HOMEBREW_TAP_TOKEN: ${{ secrets.HASP_HOMEBREW_TAP_TOKEN }}
          HASP_HOMEBREW_TAP_PUSH_KEY: ${{ secrets.HASP_HOMEBREW_TAP_PUSH_KEY }}
        run: |
          if [[ -n "$HASP_HOMEBREW_TAP_TOKEN" ]]; then
            tap_auth_header="$(printf 'x-access-token:%s' "$HASP_HOMEBREW_TAP_TOKEN" | base64 | tr -d '\n')"
            trap 'git -C tap-repo config --local --unset-all http.https://github.com/.extraheader >/dev/null 2>&1 || true' EXIT
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $tap_auth_header" \
              clone https://github.com/gethasp/homebrew-tap.git tap-repo
            git -C tap-repo config --local http.https://github.com/.extraheader "AUTHORIZATION: basic $tap_auth_header"
          elif [[ -n "$HASP_HOMEBREW_TAP_PUSH_KEY" ]]; then
            test -n "$HASP_HOMEBREW_TAP_PUSH_KEY"
            eval "$(ssh-agent -s)"
            printf '%s' "$HASP_HOMEBREW_TAP_PUSH_KEY" | base64 --decode > tap_key
            chmod 600 tap_key
            ssh-add tap_key
            git clone git@github.com:gethasp/homebrew-tap.git tap-repo
          else
            echo "HASP_HOMEBREW_TAP_TOKEN or HASP_HOMEBREW_TAP_PUSH_KEY is required" >&2
            exit 1
          fi
          bash ./scripts/publish-homebrew-tap.sh --push "$RELEASE_DIR/Formula/hasp.rb" tap-repo "$RELEASE_TAG"

  resume-published-release-live-smoke:
    if: github.event_name == 'workflow_dispatch' && github.repository == 'gethasp/hasp'
    needs:
      - resume-inputs
      - resume-publish-homebrew-tap
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Smoke published install paths
        env:
          RELEASE_TAG: ${{ needs.resume-inputs.outputs.tag }}
        run: |
          bash ./scripts/verify-live-release.sh --skip-github-release --brew-install "$RELEASE_TAG"

  resume-github-release:
    if: github.event_name == 'workflow_dispatch' && github.repository == 'gethasp/hasp'
    needs:
      - resume-inputs
      - resume-latest-mirror
      - resume-publish-homebrew-tap
      - resume-published-release-live-smoke
    runs-on: ubicloud-standard-2
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
          run-id: ${{ needs.resume-inputs.outputs.source_run_id }}
          github-token: ${{ github.token }}
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.resume-inputs.outputs.tag }}
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: |
            ${{ needs.resume-inputs.outputs.release_dir }}/hasp*
            ${{ needs.resume-inputs.outputs.release_dir }}/KEYS-*
            ${{ needs.resume-inputs.outputs.release_dir }}/release-metadata.json*
            ${{ needs.resume-inputs.outputs.release_dir }}/SHA256SUMS*
            ${{ needs.resume-inputs.outputs.release_dir }}/RELEASE-SIGNING-FINGERPRINT.txt
