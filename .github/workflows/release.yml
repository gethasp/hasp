name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to resume, for example v0.1.56"
        required: true
        type: string
      source_run_id:
        description: "Release workflow run ID that produced the public-release artifact"
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: public-release
  cancel-in-progress: false

jobs:
  release-targets:
    if: github.event_name == 'push' && github.repository == 'gethasp/hasp' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubicloud-standard-2
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: targets
        run: python3 scripts/release_targets.py github-output >> "$GITHUB_OUTPUT"

  release-smoke:
    name: Release Smoke (${{ matrix.goos }}/${{ matrix.goarch }})
    needs:
      - release-targets
      - build-public-release
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.release-targets.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
          cache: false
      - name: Bootstrap Go tools
        run: bash ./scripts/bootstrap_go_tools.sh release-smoke
      - name: Test Darwin packages
        if: matrix.goos == 'darwin'
        run: make test
      - name: Race Darwin packages
        if: matrix.goos == 'darwin' && matrix.goarch == 'arm64'
        run: make test-race
      - name: Audit Darwin coverage
        if: matrix.goos == 'darwin' && matrix.goarch == 'arm64'
        run: make coverage-audit-platform
      - name: Smoke release artifact
        run: bash ./scripts/release-smoke.sh --target "${{ matrix.goos }}/${{ matrix.goarch }}" --release-dir "dist/public-release/${GITHUB_REF_NAME}"

  release-preflight:
    needs: release-targets
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
          cache: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Bootstrap Go tools
        run: bash ./scripts/bootstrap_go_tools.sh verify
      - name: Run release preflight
        run: make release-preflight

  build-public-release:
    needs:
      - release-targets
      - release-preflight
      - build-notarized-macos-dmg
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
          cache: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Bootstrap Go tools
        run: bash ./scripts/bootstrap_go_tools.sh verify
      - name: Validate release tag matches VERSION
        run: test "v$(cat VERSION)" = "${GITHUB_REF_NAME}"
      - name: Verify release tag commit is on main
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Run release gate
        run: make release-gate
      - name: Import release signing key
        env:
          HASP_RELEASE_GPG_PRIVATE_KEY: ${{ secrets.HASP_RELEASE_GPG_PRIVATE_KEY }}
        run: |
          test -n "$HASP_RELEASE_GPG_PRIVATE_KEY"
          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          chmod 700 "$GNUPGHOME"
          printf '%s' "$HASP_RELEASE_GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
      - name: Extract release notes from changelog
        run: bash ./scripts/release-notes-from-changelog.sh "${GITHUB_REF_NAME}" > release-notes.md
      - name: Build public release set
        env:
          HASP_TEAM_ID: ${{ secrets.HASP_TEAM_ID || 'UFV835UGV6' }}
          HASP_RELEASE_GPG_KEY_ID: ${{ secrets.HASP_RELEASE_GPG_KEY_ID }}
          HASP_RELEASE_GPG_PASSPHRASE: ${{ secrets.HASP_RELEASE_GPG_PASSPHRASE }}
          HASP_RELEASE_TRUSTED_GPG_FINGERPRINTS: ${{ secrets.HASP_RELEASE_TRUSTED_GPG_FINGERPRINTS }}
          HASP_UPGRADE_TRUST_ROOTS_HEX: ${{ secrets.HASP_UPGRADE_TRUST_ROOTS_HEX }}
          HASP_UPGRADE_SIGNING_KEY_B64: ${{ secrets.HASP_UPGRADE_SIGNING_KEY_B64 }}
          HASP_RELEASE_BASE_URL: https://downloads.gethasp.com/hasp/releases
          HASP_MACOS_DMG_SHA256: ${{ needs.build-notarized-macos-dmg.outputs.sha256 }}
          HASP_MACOS_DMG_URL: https://download.gethasp.com/macos/HASP-${{ needs.build-notarized-macos-dmg.outputs.version }}.dmg
        run: |
          : "${HASP_MACOS_DMG_SHA256:?HASP_MACOS_DMG_SHA256 is required}"
          : "${HASP_MACOS_DMG_URL:?HASP_MACOS_DMG_URL is required}"
          bash ./scripts/package-public-release.sh "${GITHUB_REF_NAME}"
      - name: Verify cask artifact exists
        run: test -s "dist/public-release/${GITHUB_REF_NAME}/Casks/hasp.rb"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: public-release
          path: |
            dist/public-release/${{ github.ref_name }}/**/*
            release-notes.md

  build-notarized-macos-dmg:
    needs: release-preflight
    runs-on: macos-15
    outputs:
      sha256: ${{ steps.dmg.outputs.sha256 }}
      version: ${{ steps.dmg.outputs.version }}
    env:
      HASP_FLOWDECK_VERSION: "1.14.1"
      HASP_CREATE_DMG_VERSION: "1.2.3"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
          cache: false
      - name: Install macOS packaging tools
        run: |
          brew install create-dmg
          curl -fsSL https://flowdeck.studio/install.sh -o "$RUNNER_TEMP/install-flowdeck.sh"
          FLOWDECK_VERSION="$HASP_FLOWDECK_VERSION" sh "$RUNNER_TEMP/install-flowdeck.sh"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          flowdeck --version | grep -F "$HASP_FLOWDECK_VERSION"
          brew list --versions create-dmg | grep -F "$HASP_CREATE_DMG_VERSION"
      - name: Build, sign, notarize, and staple DMG
        id: dmg
        env:
          HASP_TEAM_ID: ${{ secrets.HASP_TEAM_ID || 'UFV835UGV6' }}
          HASP_DEVELOPER_ID_APPLICATION: ${{ secrets.HASP_DEVELOPER_ID_APPLICATION }}
          HASP_DEVELOPER_ID_APPLICATION_P12_B64: ${{ secrets.HASP_DEVELOPER_ID_APPLICATION_P12_B64 }}
          HASP_DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.HASP_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          HASP_NOTARY_KEY_B64: ${{ secrets.HASP_NOTARY_KEY_B64 }}
          HASP_NOTARY_KEY_ID: ${{ secrets.HASP_NOTARY_KEY_ID }}
          HASP_NOTARY_ISSUER_ID: ${{ secrets.HASP_NOTARY_ISSUER_ID }}
          HASP_SPARKLE_PUBLIC_ED_KEY: ${{ secrets.HASP_SPARKLE_PUBLIC_ED_KEY }}
          FLOWDECK_LICENSE_KEY: ${{ secrets.FLOWDECK_LICENSE_KEY }}
        run: |
          : "${HASP_TEAM_ID:?HASP_TEAM_ID is required}"
          : "${HASP_DEVELOPER_ID_APPLICATION:?HASP_DEVELOPER_ID_APPLICATION is required}"
          : "${HASP_DEVELOPER_ID_APPLICATION_P12_B64:?HASP_DEVELOPER_ID_APPLICATION_P12_B64 is required}"
          : "${HASP_DEVELOPER_ID_APPLICATION_P12_PASSWORD:?HASP_DEVELOPER_ID_APPLICATION_P12_PASSWORD is required}"
          : "${HASP_NOTARY_KEY_B64:?HASP_NOTARY_KEY_B64 is required}"
          : "${HASP_NOTARY_KEY_ID:?HASP_NOTARY_KEY_ID is required}"
          : "${HASP_NOTARY_ISSUER_ID:?HASP_NOTARY_ISSUER_ID is required}"
          : "${HASP_SPARKLE_PUBLIC_ED_KEY:?HASP_SPARKLE_PUBLIC_ED_KEY is required}"
          : "${FLOWDECK_LICENSE_KEY:?FLOWDECK_LICENSE_KEY is required}"
          notary_key="$RUNNER_TEMP/AuthKey_${HASP_NOTARY_KEY_ID}.p8"
          printf '%s' "$HASP_NOTARY_KEY_B64" | base64 --decode > "$notary_key"
          trap 'rm -f "$notary_key"' EXIT
          bash ./scripts/package-macos-dmg.sh \
            --identity "$HASP_DEVELOPER_ID_APPLICATION" \
            --p12-b64 "$HASP_DEVELOPER_ID_APPLICATION_P12_B64" \
            --p12-password "$HASP_DEVELOPER_ID_APPLICATION_P12_PASSWORD" \
            --notarize \
            --notary-key "$notary_key" \
            --notary-key-id "$HASP_NOTARY_KEY_ID" \
            --notary-issuer-id "$HASP_NOTARY_ISSUER_ID"
          version="$(cat VERSION)"
          dmg="dist/macos/HASP-${version}.dmg"
          test -s "$dmg"
          xcrun stapler validate "$dmg"
          spctl --assess --type install -vv "$dmg"
          spctl -a -t open --context context:primary-signature -vv "$dmg"
          mount_dir="$(mktemp -d)"
          hdiutil attach "$dmg" -mountpoint "$mount_dir" -nobrowse -quiet
          trap 'hdiutil detach "$mount_dir" -quiet || true; rm -rf "$mount_dir"; rm -f "$notary_key"' EXIT
          codesign --verify --strict --verbose=2 "$mount_dir/HASP.app"
          spctl --assess --type exec -vv "$mount_dir/HASP.app"
          sha256="$(shasum -a 256 "$dmg" | awk '{print $1}')"
          {
            printf 'version=%s\n' "$version"
            printf 'sha256=%s\n' "$sha256"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: notarized-macos-dmg
          path: |
            dist/macos/HASP-*.dmg
            dist/macos/HASP-*.dmg.sha256

  publish-r2:
    needs:
      - release-smoke
      - build-notarized-macos-dmg
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: notarized-macos-dmg
          path: dist/macos
      - name: Publish notarized macOS DMG to Cloudflare R2
        env:
          HASP_R2_ENDPOINT: ${{ secrets.HASP_R2_ENDPOINT }}
          HASP_R2_BUCKET: ${{ secrets.HASP_R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.HASP_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HASP_R2_SECRET_ACCESS_KEY }}
          EXPECTED_DMG_SHA256: ${{ needs.build-notarized-macos-dmg.outputs.sha256 }}
          HASP_RELEASE_GPG_KEY_ID: ${{ secrets.HASP_RELEASE_GPG_KEY_ID }}
          HASP_RELEASE_GPG_PASSPHRASE: ${{ secrets.HASP_RELEASE_GPG_PASSPHRASE }}
        run: |
          : "${HASP_R2_ENDPOINT:?HASP_R2_ENDPOINT is required}"
          : "${HASP_R2_BUCKET:?HASP_R2_BUCKET is required}"
          : "${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}"
          : "${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}"
          : "${EXPECTED_DMG_SHA256:?EXPECTED_DMG_SHA256 is required}"
          RELEASE_TAG="${GITHUB_REF_NAME}"
          release_dir="dist/public-release/${GITHUB_REF_NAME}"
          metadata="$release_dir/release-metadata.json"
          test -d "$release_dir"
          test -f "$metadata"
          actual_version="$(python3 - <<'PY' "$metadata"
          import json
          import sys
          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              print(json.load(handle)["version"])
          PY
          )"
          test "v${actual_version}" = "$RELEASE_TAG"
          bash ./scripts/publish-release-to-r2.sh "$release_dir" "$RELEASE_TAG"
          version="${GITHUB_REF_NAME#v}"
          dmg="dist/macos/HASP-${version}.dmg"
          sha_file="${dmg}.sha256"
          test -s "$dmg"
          test -s "$sha_file"
          computed_sha256="$(shasum -a 256 "$dmg" | awk '{print $1}')"
          recorded_sha256="$(awk '{print $1}' "$sha_file")"
          test "$computed_sha256" = "$recorded_sha256"
          test "$computed_sha256" = "$EXPECTED_DMG_SHA256"
          go run ./apps/server/cmd/release-sign tarball "$dmg"
          gpg --batch --yes --armor --detach-sign "$dmg"
          aws --endpoint-url "$HASP_R2_ENDPOINT" s3api put-object --bucket "$HASP_R2_BUCKET" --key "macos/HASP-${version}.dmg" --body "$dmg" --if-none-match '*' >/dev/null
          aws --endpoint-url "$HASP_R2_ENDPOINT" s3api put-object --bucket "$HASP_R2_BUCKET" --key "macos/HASP-${version}.dmg.sha256" --body "$sha_file" --if-none-match '*' >/dev/null
          aws --endpoint-url "$HASP_R2_ENDPOINT" s3api put-object --bucket "$HASP_R2_BUCKET" --key "macos/HASP-${version}.dmg.sig" --body "${dmg}.sig" --if-none-match '*' >/dev/null
          aws --endpoint-url "$HASP_R2_ENDPOINT" s3api put-object --bucket "$HASP_R2_BUCKET" --key "macos/HASP-${version}.dmg.asc" --body "${dmg}.asc" --if-none-match '*' >/dev/null

  deploy-beta-appcast-worker:
    needs: publish-r2
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Bootstrap web tools
        run: bash ./scripts/bootstrap_web_tools.sh
      - name: Deploy beta appcast Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm -C apps/web exec wrangler deploy --config beta-appcast/wrangler.toml
      - name: Smoke beta appcast Worker auth boundary
        run: |
          test "$(curl -sS -o /tmp/beta-appcast.xml -w '%{http_code}' https://appcast-beta.gethasp.com/appcast-beta.xml)" = "401"

  deploy-download-worker:
    needs:
      - publish-r2
      - deploy-beta-appcast-worker
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Bootstrap web tools
        run: bash ./scripts/bootstrap_web_tools.sh
      - name: Rotate Worker release metadata guards
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          release_dir="dist/public-release/${GITHUB_REF_NAME}"
          metadata_path="$release_dir/release-metadata.json"
          metadata_url="https://downloads.gethasp.com/hasp/releases/${GITHUB_REF_NAME}/release-metadata.json"
          test -f "$metadata_path"
          metadata_sha256="$(shasum -a 256 "$metadata_path" | awk '{print $1}')"
          release_sequence="$(python3 - <<'PY' "$metadata_path"
          import json
          import sys
          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              print(json.load(handle)["release_sequence"])
          PY
          )"
          {
            printf 'HASP_EXPECTED_RELEASE_VERSION=%s\n' "${GITHUB_REF_NAME#v}"
            printf 'HASP_EXPECTED_RELEASE_SEQUENCE=%s\n' "$release_sequence"
          } >> "$GITHUB_ENV"
          printf '%s' "$metadata_sha256" | pnpm -C apps/web exec wrangler secret put HASP_RELEASE_METADATA_SHA256 --config downloads/wrangler.toml
          printf '%s' "$release_sequence" | pnpm -C apps/web exec wrangler secret put HASP_RELEASE_MIN_SEQUENCE --config downloads/wrangler.toml
          printf '%s' "$metadata_url" | pnpm -C apps/web exec wrangler secret put HASP_RELEASE_METADATA_URL --config downloads/wrangler.toml
          pnpm -C apps/web exec wrangler deploy --config downloads/wrangler.toml
      - name: Smoke download Worker release endpoint
        run: |
          retry_curl() {
            local output="$1"
            local url="$2"
            local attempt
            for attempt in $(seq 1 12); do
              if curl -fsS "$url" -o "$output"; then
                return 0
              fi
              sleep 10
            done
            curl -fsS "$url" -o "$output"
          }
          retry_curl /tmp/hasp-release.json https://download.gethasp.com/api/release
          retry_curl /tmp/hasp-release-metadata.json https://download.gethasp.com/api/release-metadata
          retry_curl /tmp/hasp-release-metadata.asc https://download.gethasp.com/api/release-metadata.asc
          retry_curl /tmp/hasp-release-public-key.asc https://download.gethasp.com/api/release-public-key.asc
          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          trap 'rm -rf "$GNUPGHOME"' EXIT
          source scripts/release-public-key-trust.sh
          trusted_fingerprints="$(sed -E 's/#.*$//; s/[[:space:]]+//g; /^$/d' scripts/release-trusted-gpg-fingerprints.txt | paste -sd, -)"
          release_trust_import_public_key_bundle /tmp/hasp-release-public-key.asc "$GNUPGHOME" "$trusted_fingerprints"
          gpgv --keyring "$release_trust_keyring_path" /tmp/hasp-release-metadata.asc /tmp/hasp-release-metadata.json
          while read -r goos goarch _runner; do
            expected_location="https://downloads.gethasp.com/hasp/releases/${GITHUB_REF_NAME}/hasp_${GITHUB_REF_NAME#v}_${goos}_${goarch}.tar.gz"
            for attempt in $(seq 1 12); do
              redirect_location="$(curl -fsSI "https://download.gethasp.com/download/${goos}/${goarch}" | awk 'BEGIN{IGNORECASE=1} /^location:/ {sub(/\r$/, "", $2); print $2; exit}')"
              if [[ "$redirect_location" == "$expected_location" ]]; then
                break
              fi
              if [[ "$attempt" == "12" ]]; then
                printf 'unexpected %s/%s download redirect: %s\n' "$goos" "$goarch" "$redirect_location" >&2
                exit 1
              fi
              sleep 10
            done
          done < <(python3 scripts/release_targets.py shell)
          python3 - <<'PY'
          import os
          import json
          with open("/tmp/hasp-release.json", "r", encoding="utf-8") as handle:
              metadata = json.load(handle)
          with open("/tmp/hasp-release-metadata.json", "r", encoding="utf-8") as handle:
              signed_metadata = json.load(handle)
          expected_version = os.environ["HASP_EXPECTED_RELEASE_VERSION"]
          expected_sequence = int(os.environ["HASP_EXPECTED_RELEASE_SEQUENCE"])
          if metadata.get("version") != expected_version:
              raise SystemExit(f"download Worker returned version {metadata.get('version')}, want {expected_version}")
          if metadata.get("release_sequence") != expected_sequence:
              raise SystemExit(f"download Worker returned sequence {metadata.get('release_sequence')}, want {expected_sequence}")
          if signed_metadata.get("version") != expected_version:
              raise SystemExit("download Worker served stale release metadata")
          PY
      - name: Promote latest release mirror
        env:
          HASP_R2_ENDPOINT: ${{ secrets.HASP_R2_ENDPOINT }}
          HASP_R2_BUCKET: ${{ secrets.HASP_R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.HASP_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HASP_R2_SECRET_ACCESS_KEY }}
          HASP_R2_PROMOTE_LATEST: "1"
        run: |
          release_dir="dist/public-release/${GITHUB_REF_NAME}"
          test -d "$release_dir"
          bash ./scripts/publish-release-to-r2.sh "$release_dir" "${GITHUB_REF_NAME}"
      - name: Verify latest release mirror
        run: |
          release_dir="dist/public-release/${GITHUB_REF_NAME}"
          retry_latest_diff() {
            local asset="$1"
            local tmp="/tmp/hasp-latest-${asset//\//-}"
            local attempt
            for attempt in $(seq 1 12); do
              if curl -fsS "https://downloads.gethasp.com/hasp/releases/latest/${asset}" -o "$tmp" && diff -u "$release_dir/$asset" "$tmp"; then
                return 0
              fi
              sleep 10
            done
            curl -fsS "https://downloads.gethasp.com/hasp/releases/latest/${asset}" -o "$tmp"
            diff -u "$release_dir/$asset" "$tmp"
          }
          for asset in release-metadata.json release-metadata.json.asc hasp-release-public-key.asc; do
            retry_latest_diff "$asset"
          done

  homebrew-formula-smoke:
    needs: publish-r2
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
      - name: Smoke packaged Homebrew formula
        run: |
          bash ./scripts/homebrew-formula-smoke.sh "dist/public-release/${GITHUB_REF_NAME}/Formula/hasp.rb"

  homebrew-cask-smoke:
    needs: publish-r2
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
      - name: Smoke packaged Homebrew cask
        run: |
          bash ./scripts/homebrew-cask-smoke.sh "dist/public-release/${GITHUB_REF_NAME}/Casks/hasp.rb"

  publish-homebrew-tap:
    needs:
      - deploy-download-worker
      - homebrew-formula-smoke
      - homebrew-cask-smoke
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
      - name: Publish Homebrew tap
        env:
          HASP_HOMEBREW_TAP_TOKEN: ${{ secrets.HASP_HOMEBREW_TAP_TOKEN }}
          HASP_HOMEBREW_TAP_PUSH_KEY: ${{ secrets.HASP_HOMEBREW_TAP_PUSH_KEY }}
        run: |
          if [[ -n "$HASP_HOMEBREW_TAP_TOKEN" ]]; then
            tap_auth_header="$(printf 'x-access-token:%s' "$HASP_HOMEBREW_TAP_TOKEN" | base64 | tr -d '\n')"
            trap 'git -C tap-repo config --local --unset-all http.https://github.com/.extraheader >/dev/null 2>&1 || true' EXIT
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $tap_auth_header" \
              clone https://github.com/gethasp/homebrew-tap.git tap-repo
            git -C tap-repo config --local http.https://github.com/.extraheader "AUTHORIZATION: basic $tap_auth_header"
          elif [[ -n "$HASP_HOMEBREW_TAP_PUSH_KEY" ]]; then
            test -n "$HASP_HOMEBREW_TAP_PUSH_KEY"
            eval "$(ssh-agent -s)"
            printf '%s' "$HASP_HOMEBREW_TAP_PUSH_KEY" | base64 --decode > tap_key
            chmod 600 tap_key
            ssh-add tap_key
            git clone git@github.com:gethasp/homebrew-tap.git tap-repo
          else
            echo "HASP_HOMEBREW_TAP_TOKEN or HASP_HOMEBREW_TAP_PUSH_KEY is required" >&2
            exit 1
          fi
          bash ./scripts/publish-homebrew-tap.sh --push --cask "dist/public-release/${GITHUB_REF_NAME}/Casks/hasp.rb" "dist/public-release/${GITHUB_REF_NAME}/Formula/hasp.rb" tap-repo "${GITHUB_REF_NAME}"

  published-release-live-smoke:
    needs: publish-homebrew-tap
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Smoke published install paths
        run: |
          bash ./scripts/verify-live-release.sh --skip-github-release --brew-install "${GITHUB_REF_NAME}"

  github-release:
    needs:
      - publish-r2
      - deploy-download-worker
      - publish-homebrew-tap
      - published-release-live-smoke
    runs-on: ubicloud-standard-2
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: |
            dist/public-release/${{ github.ref_name }}/hasp*
            dist/public-release/${{ github.ref_name }}/KEYS-*
            dist/public-release/${{ github.ref_name }}/release-metadata.json*
            dist/public-release/${{ github.ref_name }}/SHA256SUMS*
            dist/public-release/${{ github.ref_name }}/RELEASE-SIGNING-FINGERPRINT.txt

  resume-latest-mirror:
    if: github.event_name == 'workflow_dispatch' && github.repository == 'gethasp/hasp'
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: public-release
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}
      - name: Promote latest release mirror
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          HASP_R2_ENDPOINT: ${{ secrets.HASP_R2_ENDPOINT }}
          HASP_R2_BUCKET: ${{ secrets.HASP_R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.HASP_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HASP_R2_SECRET_ACCESS_KEY }}
          HASP_R2_PROMOTE_LATEST: "1"
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "tag must start with v: $RELEASE_TAG" >&2; exit 2 ;;
          esac
          release_dir="dist/public-release/$RELEASE_TAG"
          test -d "$release_dir"
          bash ./scripts/publish-release-to-r2.sh "$release_dir" "$RELEASE_TAG"
      - name: Verify latest release mirror
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          release_dir="dist/public-release/$RELEASE_TAG"
          retry_latest_diff() {
            local asset="$1"
            local tmp="/tmp/hasp-latest-${asset//\//-}"
            local attempt
            for attempt in $(seq 1 12); do
              if curl -fsS "https://downloads.gethasp.com/hasp/releases/latest/${asset}" -o "$tmp" && diff -u "$release_dir/$asset" "$tmp"; then
                return 0
              fi
              sleep 10
            done
            curl -fsS "https://downloads.gethasp.com/hasp/releases/latest/${asset}" -o "$tmp"
            diff -u "$release_dir/$asset" "$tmp"
          }
          for asset in release-metadata.json release-metadata.json.asc hasp-release-public-key.asc; do
            retry_latest_diff "$asset"
          done
