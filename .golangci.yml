version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - unconvert
    - usestdlibvars
    - fatcontext
    - dupl
  settings:
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - (io).Copy
    dupl:
      threshold: 150
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # The flag-drift AST scanner tests in package app are intentionally
      # near-duplicates: each one re-runs the same scan over a sibling
      # subpackage (agentops, appops, secretops, sessionops). Extracting a
      # shared helper would obscure the per-package mapping. Suppress dupl
      # on these files.
      - path: internal/app/.*drift.*_test\.go
        linters:
          - dupl
    paths:
      - vendor
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
